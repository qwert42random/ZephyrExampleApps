# Description of the device
description: Custom GPIO

# Compatibility string that matches the one in the Devicetree source and
# DT_DRV_COMPAT macro in the driver source code
compatible: "custom,gpio"

# Define the required node properties
properties:
  gpio_port:
    type: string
    required: true
    enum:
      - "A"
      - "B"
      - "C"
      - "D"
      - "E"
      - "F"
      - "G"
      - "H"
      - "I"
      - "J"

  pin:
    type: int
    required: true
  
  pull_type:
    type: string
    required: true
    enum:
      - "none"
      - "pull_up"
      - "pull_down"
  
  output:
    type: string
    required: true
    enum:
      - "input"
      - "output"
